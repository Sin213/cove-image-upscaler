<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'" />
    <title>Cove Image Upscaler</title>
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <style>
      /* Pre-Tailwind boot styles — prevent the light-mode flash before the
         renderer's CSS / theme class is applied. */
      html, body { background-color: #0b1013; color: #e6edf0; }
      @media (prefers-color-scheme: light) {
        html, body { background-color: #f7f8fa; color: #11181c; }
      }
      html.dark, html.dark body { background-color: #0b1013; color: #e6edf0; }
      html:not(.dark), html:not(.dark) body { background-color: #f7f8fa; color: #11181c; }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("cove:theme");
          var theme = stored === "light" || stored === "dark"
            ? stored
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-bg text-text antialiased">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
