name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install deps
        run: npm ci

      - name: Build & package (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --linux --publish always

      # Fleet policy: every release artifact gets its own <name>.sha256
      # sidecar (sha256sum format), including auto-update metadata.
      - name: Generate + upload sha256 sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(node -p "require('./package.json').version")"
          cd release
          for f in *.AppImage *.deb latest*.yml; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
            gh release upload "$TAG" "$f.sha256" --clobber
          done

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & package (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --win --publish always

      # Fleet policy: every release artifact gets its own <name>.sha256
      # sidecar (sha256sum format), including auto-update metadata.
      - name: Generate + upload sha256 sidecars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v$(node -p "require('./package.json').version")"
          cd release
          for f in *-Setup.exe *-Portable.exe latest*.yml; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
            gh release upload "$TAG" "$f.sha256" --clobber
          done

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: release/*-Setup.exe
          if-no-files-found: error

      - name: Upload Portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*-Portable.exe
          if-no-files-found: error

